<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-L3</title>
</head>
<body>
    <h3>Registration Form</h3>
    <form action="/action">
        <div>
        <label for="firstname"></label>
        <input type="text" name="first_name" id="first_name" placeholder="First Name"/>
        <label for="lastname"></label>
        <input type="text" name="last_name" id="last_name" placeholder="Last Name"/>
        </div>
        <div>
        <label for="gender_select">Please select gender</label>
        <select id="gender" name="gender">
            <option value="m">Male</option>
            <option value="f">Female</option>
            <option value="Other">Other</option>
        </select>
        </div>
        <div>
        <!--CheckBox-->
        <label for="checkbox">Do you agree to all terms of service?</label>
        <label for="yes">Yes, I agree</label>
        <input type="checkbox" id="yes" name="terms&cond">
        <button type="submit">Register</button>
        </div>
    </form>
</body>
</html>
