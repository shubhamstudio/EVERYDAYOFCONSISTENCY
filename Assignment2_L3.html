<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment2-L3</title>
</head>
<body>
    <div>
        <!--Recreating the table-->
        <table border="black">
          <caption>Student Information</caption>

            <thead>
            <tr>
            <th rowspan="2"></th>
            <th rowspan="2">Name</th>
            <th colspan="2">Address</th>
            </tr>
            <tr>
                <th>City</th>
                <th>House</th>
            </tr>
            </thead>

            <tbody>
                <tr>
                    <td rowspan="4">Info</td>
                    <td>A</td>
                    <td>Delhi</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>B</td>
                    <td>Mumbai</td>
                    <td>2</td>
                </tr>
                <tr>
                    <td>C</td>
                    <td>Kolkata</td>
                    <td>3</td>
                </tr>
                <tr>
                    <td>D</td>
                    <td>Pune</td>
                    <td>4</td>
                </tr>
            </tbody>
        </table>
    </div>
    <br>
    <div>
        <form action="/action?">

            <!--Name-->
            <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"/>
            </div>
            <br>
            <!--Gender-->
            <div>
            <label for="gender">Sex:</label>
            <input type="radio" id="m" name="m">
            <label for="m">Male</label>
            <input type="radio" id="f" name="f">
            <label for="m">Female</label>
            </div>
            <br>
            <!--Country-->
            <div>
                <label for="country">Country</label>
                <select id="country" name="country">
                    <option>Select an option</option>
                    <option value="ind">India</option>
                    <option value="indo">Indonesia</option>
                </select>
            </div>
            <br>
            <!--Message/ Feedback-->
            <div>
                <label for="msg">Message:</label>
                <textarea id="msg" name="msg" placeholder="type your message here"></textarea>
            </div>
            <br>
            <!--Subscibe?-->
            <div>
                <input type="checkbox" id="subs" name="subs">
                <label for="subs">Subscribe?</label>
            </div>
            <br>
            <div>
            <button type="submit">Submit</button>
            </div>
        </form>
    </div>












</html>
