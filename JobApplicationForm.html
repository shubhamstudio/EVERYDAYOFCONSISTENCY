<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="JobApplicationForm.css">
</head>
<body>
    <h1 id="app-heading">Job Application Form</h1>
    <div class="container">
        <form action="server?">
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your name" >
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" >

            <label for="position">Position:</label>
            <select name="position" id="position">Select a position
            <option value="dev">Developer</option>
            <option value="dev">Tester</option>
            <option value="dev">Designer</option>
            </select>

            <fieldset class="radio-group" name="availability">
                <legend>Availability</legend>
                <input type="radio" name="availability" id="ft">
                <label for="ft">Full Time</label>
                <input type="radio" name="availability" id="pt">
                <label for="pt">Part Time</label>
            </fieldset>

            <label for="message">Why do you want this job?</label>
            <textarea name="msg" id="message"></textarea>
            <button type="submit">Submit Application</button>
        </form>
    </div>
</body>
</html>
