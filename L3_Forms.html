<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS in HTML</title>
</head>
<body>
    <!-- Forms making -->
    <form action="/server?">
        <div>
        <label for="username">Username : </label>
        <input type="text" id="username" placeholder="enter username" name="username"/>
        </div>
        <div>
        <label for="password">Password :</label>
        <input type="password" id="password" placeholder="enter password" name="password"/>
        </div>
        <div>
        <label for="age">Age :</label>
        <input type="number" id="age" placeholder="enter age"/>
        </div>
        <!-- Buttons in HTML -->
         <button type="submit">Submit</button>
         <button type="reset">Reset</button>

         <hr>

        <!-- Use of name in forms -->
         <label for="username">Username</label> 
         <input type="text" id="username" name="query" placeholder="Enter username">
         <button type="submit">Submit</button>
        </form>
<hr>
<p>Making Youtube search bar using name attribute and search_query</p>
        <form action="https://www.youtube.com/results">
            <input type="text" id="search_bar" name="search_query" placeholder="search on youtube">
            <button type="submit">Submit</button>
        </form>

        <form action="https://www.google.com/search">
            <input type="text" id="google_search" name="q" placeholder="search on google">
            <button type="submit">Submit</button>
        </form>

        <hr>
<form action="/server">
<input type="checkbox" id="age_check" name="age" checked>
<label for="age">I'm 18+</label>
<button type="submit">Submit</button>
<hr>
</form>
<form action="server">
<div>
<p>Radio buttons in HTML</p>
<input type="radio" id="apple" name="fruit">
<label for="apple">Apple</label>
<input type="radio" id="banana" name="fruit">
<label for="banana">Banana</label>
<input type="radio" id="guava" name="fruit">
<label for="guava">Guava</label>
</div>
<hr>
<div>
    <input type="checkbox" id="maths" name="subjects" value="maths">
    <label for="maths">Maths</label>
    <input type="checkbox" id="science" name="subjects" value="sci">
    <label for="science">Science</label>
    <input type="checkbox" id="english" name="subjects" value="eng">
    <label for="english">English</label>
    <button type="submit">Submit</button>
<br>
    <label for="shubhambisht">Shubham Bisht</label>
    <input type="checkbox" id="shubhambisht" name="q">

</div>
</form>
</body>
</html>
